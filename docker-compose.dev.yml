# Development infrastructure for pharmacy-system.
# Start with: docker compose -f docker-compose.dev.yml up -d
# Stop with:  docker compose -f docker-compose.dev.yml down
# Reset DB:   docker compose -f docker-compose.dev.yml down -v

services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: pharmacy-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: pharmacy_dev
      POSTGRES_PASSWORD: pharmacy_dev
      POSTGRES_DB: pharmacy_dev_db
    ports:
      - '5432:5432'
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    healthcheck:
      # Generous settings for dev; script does not rely on them
      test: ['CMD-SHELL', 'pg_isready -U pharmacy_dev -d pharmacy_dev_db -h 127.0.0.1']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-dev:
    image: redis:7-alpine
    container_name: pharmacy-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-dev-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  postgres-dev-data:
    name: pharmacy-postgres-dev-data
    driver: local
  redis-dev-data:
    name: pharmacy-redis-dev-data
    driver: local
<!doctype html>
<html lang="es" class="antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sistema POS para droguería — facturación electrónica, control de lotes e inventario offline-first" />
    <title>Pharmacy POS</title>
    <!-- Fonts: Inter (UI) + JetBrains Mono (data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!--
      Node.js global polyfills — MUST run before the module script
      so the Prisma runtime (loaded via @pharmacy/database) doesn't throw
      "Buffer is not defined" or "process is not defined" when it accesses
      them as bare globals (not just via node:* imports).
    -->
    <script>
      // ---- Buffer ----
      globalThis.Buffer ??= {
        alloc(s, f) { const b = new Uint8Array(s); if (f !== undefined) b.fill(f); return b; },
        allocUnsafe(s) { return new Uint8Array(s); },
        from(d, e) { return typeof d === 'string' ? new TextEncoder().encode(d) : new Uint8Array(d); },
        concat(l) { let t=0; for (const b of l) t+=b.length; const r=new Uint8Array(t); let o=0; for (const b of l) { r.set(b,o); o+=b.length; } return r; },
        isBuffer() { return false; },
        byteLength(s) { return new TextEncoder().encode(s).length; },
      };

      // ---- process ----
      globalThis.process ??= {
        env: {},
        version: '22.0.0',
        versions: { node: '22.0.0' },
        arch: 'wasm',
        platform: 'browser',
        cwd: () => '/',
        pid: 0,
        nextTick: (fn) => Promise.resolve().then(() => fn()),
        stdout: { isTTY: false, write: () => {} },
        argv: [],
        exit: () => {},
        on: () => {},
        emit: () => {},
      };

      // ---- global & __dirname ----
      globalThis.global ??= globalThis;
      globalThis.__dirname ??= '/';
      globalThis.__filename ??= '/index.js';
    </script>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
